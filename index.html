<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Aprendizagem · LP</title>
<!-- ══ PWA META ══ -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário LP">
<meta name="theme-color" content="#0d0d0d">
<meta name="description" content="Diário socrático de aprendizagem — LP, Informática, Luanda">

<!-- Manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Favicon & Apple Touch Icon (usa a imagem do estudo ao crepúsculo) -->
<link rel="icon" type="image/jpeg" href="./icon-192.jpg">
<link rel="apple-touch-icon" href="./icon-512.jpg">
<!-- ══ /PWA META ══ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #111111;
    --border: #1e1e1e;
    --border2: #141414;
    --gold: #c8a86b;
    --gold-dim: rgba(200,168,107,0.15);
    --dim: #3a3020;
    --muted: #4a4030;
    --text: #e0d8c8;
    --subtext: #8a8070;
    --green: #5a9050;
    --green-dim: #1a2818;
    --green-border: #2a4020;
    --amber: #6a5030;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Cormorant Garamond', Georgia, serif;
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--serif); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  /* HEADER */
  #header {
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 99;
    background: var(--bg);
  }
  #header h1 { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; color: var(--text); }
  #header p.byline { font-family: var(--mono); font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.1rem; }

  .nav-tabs { display: flex; gap: 0.35rem; }
  .nav-tab {
    padding: 0.3rem 0.72rem; border-radius: 3px;
    font-family: var(--mono); font-size: 0.63rem; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all 0.12s;
  }
  .nav-tab.active { background: var(--gold); color: #0d0d0d; border-color: var(--gold); }
  .nav-tab:hover:not(.active) { opacity: 0.75; }

  /* LAYOUT */
  .page { display: none; }
  .page.active { display: block; }

  .two-col {
    max-width: 820px; margin: 0 auto; padding: 1.25rem 1.5rem;
    display: grid; grid-template-columns: 175px 1fr; gap: 1.5rem;
  }
  .single-col { max-width: 700px; margin: 0 auto; padding: 1.25rem 1.5rem; }

  /* SIDEBAR */
  .sidebar { position: sticky; top: 68px; align-self: start; }
  .sidebar-label {
    font-family: var(--mono); font-size: 0.56rem; color: var(--dim);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; display: block;
  }

  /* CARD */
  .card {
    padding: 1.1rem 1.2rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.85rem;
  }
  .card-label {
    font-family: var(--mono); font-size: 0.56rem; color: var(--dim);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; display: block;
  }

  /* PROGRESS BAR */
  .progress-wrap { padding: 0.7rem; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 0.9rem; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
  .progress-header span { font-family: var(--mono); font-size: 0.54rem; }
  .progress-header .pct { color: var(--gold); }
  .progress-header .lbl { color: var(--dim); }
  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.3s; }

  /* DAY BUTTONS */
  .day-btn {
    display: flex; width: 100%; align-items: center; justify-content: space-between;
    padding: 0.42rem 0.6rem; margin-bottom: 0.15rem; border-radius: 4px;
    background: transparent; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.1s;
  }
  .day-btn.active { background: #1a1815; border-color: rgba(200,168,107,0.25); }
  .day-btn:hover:not(.active) { opacity: 0.75; }
  .day-btn .day-name { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); text-transform: uppercase; }
  .day-btn.active .day-name { color: var(--gold); }
  .day-btn .day-pct { font-family: var(--mono); font-size: 0.56rem; }

  /* Q NAV */
  .q-nav-btn {
    display: block; width: 100%; text-align: left;
    padding: 0.38rem 0.6rem; margin-bottom: 0.13rem; border-radius: 3px;
    border: none; border-left: 2px solid #1a1815;
    background: transparent; cursor: pointer; transition: all 0.1s;
  }
  .q-nav-btn.active { background: #1a1815; border-left-color: var(--gold); }
  .q-nav-btn.filled { border-left-color: var(--green); }
  .q-nav-btn:hover:not(.active) { opacity: 0.75; }
  .q-nav-btn .q-num { font-family: var(--mono); font-size: 0.53rem; color: #2a2020; display: block; }
  .q-nav-btn.filled .q-num { color: var(--green); }
  .q-nav-btn .q-label { font-size: 0.68rem; color: var(--muted); line-height: 1.3; margin-top: 0.07rem; }
  .q-nav-btn.active .q-label { color: #c0b8a8; }

  /* SAVE BTN */
  .save-btn {
    width: 100%; padding: 0.48rem; border-radius: 3px;
    background: var(--gold); color: #0d0d0d;
    border: none; font-family: var(--mono); font-size: 0.66rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; margin-top: 0.5rem;
  }
  .save-btn.saved { background: #1e2e1e; color: var(--green); }
  .save-btn:hover { opacity: 0.85; }

  /* DISCIPLINE TAGS */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .disc-tag {
    padding: 0.22rem 0.55rem; border-radius: 20px; font-size: 0.63rem;
    font-family: var(--mono); background: transparent;
    border: 1px solid var(--border); color: var(--dim); cursor: pointer; transition: all 0.12s;
  }
  .disc-tag.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .disc-tag:hover:not(.active) { opacity: 0.7; }

  /* QUESTION AREA */
  .q-counter { font-family: var(--mono); font-size: 0.53rem; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 0.15rem; }
  .q-prompt { font-family: var(--serif); font-size: 1.2rem; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 0.9rem; }

  textarea {
    width: 100%; padding: 0.75rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: #b0a898; font-size: 0.87rem; line-height: 1.7; font-family: Georgia, serif;
    resize: vertical; outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--gold); }

  .q-nav-btns { display: flex; justify-content: space-between; margin-top: 0.65rem; }
  .q-prev, .q-next {
    padding: 0.3rem 0.7rem; border-radius: 3px; font-family: var(--mono);
    font-size: 0.62rem; cursor: pointer; background: transparent; transition: opacity 0.12s;
  }
  .q-prev { border: 1px solid var(--border); color: var(--muted); }
  .q-next { border: 1px solid rgba(200,168,107,0.3); color: var(--gold); }
  .q-prev:disabled, .q-next:disabled { opacity: 0.25; cursor: default; }
  .q-prev:hover:not(:disabled), .q-next:hover:not(:disabled) { opacity: 0.75; }

  /* AI BLOCK */
  .ai-block { margin-bottom: 0.85rem; }
  .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
  .ai-btn {
    padding: 0.27rem 0.65rem; background: #0d1a0d;
    border: 1px solid var(--green-border); border-radius: 3px;
    color: #5a8050; font-family: var(--mono); font-size: 0.59rem; cursor: pointer;
    transition: opacity 0.12s;
  }
  .ai-btn:hover { opacity: 0.8; }
  .ai-btn:disabled { opacity: 0.4; cursor: default; }
  .ai-response { margin-top: 0.65rem; border-top: 1px solid var(--border); padding-top: 0.65rem; display: none; }
  .ai-response.visible { display: block; }
  .ai-response p { color: var(--subtext); font-size: 0.85rem; line-height: 1.8; }
  .ai-loading { color: var(--dim); font-family: var(--mono); font-size: 0.7rem; }

  /* HISTORY */
  .hist-card { margin-bottom: 0.75rem; padding: 1rem 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
  .hist-card.current { border-color: rgba(200,168,107,0.2); }
  .hist-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
  .hist-week { font-family: var(--mono); font-size: 0.59rem; color: var(--dim); }
  .hist-card.current .hist-week { color: var(--gold); }
  .hist-discs { color: var(--muted); font-size: 0.72rem; margin-top: 0.18rem; }
  .hist-score-lbl { font-family: var(--mono); font-size: 0.53rem; color: #2a2018; text-align: right; }
  .hist-score { font-family: var(--mono); font-size: 0.67rem; }
  .day-pills { display: flex; gap: 0.25rem; margin-bottom: 0.6rem; }
  .day-pill { padding: 0.17rem 0.37rem; border-radius: 3px; font-family: var(--mono); font-size: 0.54rem; text-transform: uppercase; }
  .day-pill.ok { background: var(--green-dim); border: 1px solid var(--green-border); color: #5a8050; }
  .day-pill.empty { background: #141414; border: 1px solid #1a1a1a; color: #2a2020; }
  .hist-entry-label { font-family: var(--mono); font-size: 0.51rem; color: #2a2018; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.1rem; }
  .hist-entry-val { color: #6a6858; font-size: 0.77rem; line-height: 1.6; margin-bottom: 0.35rem; }

  /* MONTHLY */
  .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
  .month-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; color: var(--text); text-transform: capitalize; }
  .month-count { font-family: var(--mono); font-size: 0.59rem; color: var(--dim); }
  .month-week-row { padding: 0.65rem 0; border-bottom: 1px solid var(--border2); }
  .month-week-row:last-child { border-bottom: none; }
  .month-week-meta { display: flex; justify-content: space-between; align-items: center; }
  .month-week-name { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); }
  .month-week-stats { display: flex; gap: 0.65rem; }
  .month-stat { font-family: var(--mono); font-size: 0.57rem; }
  .month-aha { color: #5a5848; font-size: 0.77rem; line-height: 1.5; margin-top: 0.25rem; }
  .month-note-btn {
    margin-top: 0.55rem; padding: 0.42rem 0.9rem; border-radius: 3px;
    background: var(--gold); color: #0d0d0d;
    border: none; font-family: var(--mono); font-size: 0.64rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .month-note-btn.saved { background: #1e2e1e; color: var(--green); }
  .month-note-btn:hover { opacity: 0.85; }

  .days-registered { margin-bottom: 0.9rem; }
  .days-registered .day-row { display: flex; justify-content: space-between; padding: 0.27rem 0; border-bottom: 1px solid var(--border2); }
  .days-registered .day-name { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); text-transform: uppercase; }
  .days-registered .day-sc { font-family: var(--mono); font-size: 0.59rem; }

  /* FADE ANIMATION */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade { animation: fadeIn 0.22s ease; }

  /* EMPTY STATE */
  .empty { color: var(--dim); font-family: var(--mono); font-size: 0.72rem; }

  h2.section-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; color: var(--text); margin-bottom: 1.1rem; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <p class="byline">LP · Informática · Luanda</p>
    <h1>Diário de Aprendizagem</h1>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setView('diario')">Diário</button>
    <button class="nav-tab" onclick="setView('sintese')">Síntese</button>
    <button class="nav-tab" onclick="setView('historico')">Histórico</button>
    <button class="nav-tab" onclick="setView('mensal')">Mensal</button>
  </div>
</div>

<!-- ═══════════════ DIÁRIO ═══════════════ -->
<div id="page-diario" class="page active">
  <div class="two-col">
    <div class="sidebar">
      <span class="sidebar-label" id="week-label-diario"></span>

      <!-- Dias -->
      <div id="day-btns" style="margin-bottom:1rem;"></div>

      <!-- Q Nav diário -->
      <div id="q-nav-diario" style="margin-bottom:0.75rem;"></div>

      <button class="save-btn" id="save-btn-diario" onclick="handleSave()">Guardar</button>
    </div>

    <div id="diario-main" class="fade">
      <!-- Disciplinas -->
      <div class="card">
        <span class="card-label">Disciplinas desta semana</span>
        <div class="tags-wrap" id="disc-tags"></div>
      </div>

      <!-- Pergunta activa -->
      <div class="card" id="q-card">
        <div class="q-counter" id="q-counter"></div>
        <div class="q-prompt" id="q-prompt"></div>
        <textarea id="q-textarea" rows="6" oninput="onDayInput(this.value)"></textarea>
        <div class="q-nav-btns">
          <button class="q-prev" id="q-prev" onclick="prevQ()">← Anterior</button>
          <button class="q-next" id="q-next" onclick="nextQ()">Seguinte →</button>
        </div>
      </div>

      <!-- AI dia -->
      <div class="card ai-block">
        <div class="ai-header">
          <span class="card-label" style="margin:0;">Reflexão da IA · Hoje</span>
          <button class="ai-btn" id="ai-btn-diario" onclick="handleAI('dia')">Pedir reflexão</button>
        </div>
        <div class="ai-response" id="ai-resp-diario">
          <p id="ai-text-diario" class="ai-loading"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ SÍNTESE ═══════════════ -->
<div id="page-sintese" class="page">
  <div class="two-col">
    <div class="sidebar">
      <span class="sidebar-label">Síntese semanal</span>
      <p style="font-family:var(--mono);font-size:0.59rem;color:#2a2018;margin-bottom:0.9rem;" id="week-label-sintese"></p>

      <div class="progress-wrap">
        <div class="progress-header">
          <span class="lbl">COMPLETO</span>
          <span class="pct" id="synth-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="synth-bar" style="width:0%"></div></div>
      </div>

      <!-- Dias registados -->
      <div class="days-registered" style="margin-bottom:0.9rem;">
        <span class="sidebar-label">Dias registados</span>
        <div id="days-registered-list"></div>
      </div>

      <!-- Q Nav síntese -->
      <div id="q-nav-sintese" style="margin-bottom:0.75rem;"></div>

      <button class="save-btn" id="save-btn-sintese" onclick="handleSave()">Guardar</button>
    </div>

    <div id="sintese-main" class="fade">
      <div class="card">
        <div class="q-counter" id="sq-counter"></div>
        <div class="q-prompt" id="sq-prompt"></div>
        <textarea id="sq-textarea" rows="7" oninput="onSynthInput(this.value)"></textarea>
        <div class="q-nav-btns">
          <button class="q-prev" id="sq-prev" onclick="prevSQ()">← Anterior</button>
          <button class="q-next" id="sq-next" onclick="nextSQ()">Seguinte →</button>
        </div>
      </div>

      <div class="card ai-block" id="ai-semana-block" style="display:none;">
        <div class="ai-header">
          <span class="card-label" style="margin:0;">Reflexão da IA · Semana</span>
          <button class="ai-btn" id="ai-btn-semana" onclick="handleAI('semana')">Pedir análise</button>
        </div>
        <div class="ai-response" id="ai-resp-semana">
          <p id="ai-text-semana" class="ai-loading"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ HISTÓRICO ═══════════════ -->
<div id="page-historico" class="page">
  <div class="single-col">
    <h2 class="section-title">Semanas anteriores</h2>
    <div id="historico-list"></div>
  </div>
</div>

<!-- ═══════════════ MENSAL ═══════════════ -->
<div id="page-mensal" class="page">
  <div class="single-col">
    <div class="month-header">
      <span class="month-title" id="month-title"></span>
      <span class="month-count" id="month-count"></span>
    </div>

    <div class="card">
      <span class="card-label">Padrão do mês</span>
      <div id="month-pattern"></div>
    </div>

    <div class="card">
      <span class="card-label">Nota pessoal do mês</span>
      <textarea id="month-note-ta" rows="5" placeholder="O que este mês me ensinou? Que padrão identifiquei no meu estudo? O que mudo no próximo mês?" oninput="monthNoteDirty=true"></textarea>
      <button class="month-note-btn" id="month-note-btn" onclick="saveMonthNote()" style="margin-top:0.55rem;">Guardar nota</button>
    </div>

    <div class="card ai-block" id="ai-mes-block" style="display:none;">
      <div class="ai-header">
        <span class="card-label" style="margin:0;">Análise da IA · Mês</span>
        <button class="ai-btn" id="ai-btn-mes" onclick="handleAI('mes')">Pedir análise mensal</button>
      </div>
      <div class="ai-response" id="ai-resp-mes">
        <p id="ai-text-mes" class="ai-loading"></p>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const STORAGE_KEY = 'lp_diario_v2';
const DISCIPLINES = ['Matemática','Física','Química','Electrotécnica','T.L.P','D.T','Língua Portuguesa','S.E.A.C','Empreendedorismo','F.A.I','Ed. Física'];
const DAILY_Q = [
  { id:'conceitos_dia', label:'Conceitos do dia', prompt:'O que trabalhei hoje?', placeholder:'Ex: resolvi exercícios de circuitos em série, revi funções no caderno...' },
  { id:'duvidas_dia',   label:'Dúvidas que ficaram', prompt:'O que ficou por perceber?', placeholder:'Ex: ainda não percebi como calcular a resistência equivalente em paralelo...' },
  { id:'ia_dia',        label:'IA ou independente?', prompt:'Como resolvi os problemas hoje?', placeholder:'Independente: ...\nCom IA: ...' },
  { id:'aha_dia',       label:'Momento aha', prompt:'Houve algo que clicou hoje?', placeholder:'Ex: percebi que a tensão num paralelo é sempre igual em todos os ramos...' },
];
const WEEKLY_Q = [
  { id:'clareza',      label:'O que fez sentido / confuso', prompt:'O que fez sentido esta semana e o que ainda está confuso?', placeholder:'Fez sentido: ...\nAinda confuso: ...' },
  { id:'estrategias',  label:'Estratégias que funcionaram', prompt:'Que estratégias de estudo funcionaram bem?', placeholder:'Ex: fazer exercícios antes de ver teoria, rever no dia seguinte...' },
  { id:'revisao',      label:'O que preciso rever', prompt:'O que preciso revisar ou praticar mais?', placeholder:'Ex: ainda não consigo resolver circuitos sem ver as fórmulas...' },
  { id:'habilidade',   label:'Habilidade desenvolvida', prompt:'Uma habilidade específica que desenvolvi esta semana.', placeholder:'Ex: já consigo identificar o tipo de circuito só de olhar para o esquema...' },
  { id:'balanco_ia',   label:'Balanço IA vs independente', prompt:'Como foi a divisão entre trabalho independente e uso da IA?', placeholder:'Ex: 70% independente — pedi ajuda à IA apenas para verificar raciocínio em 2 exercícios...' },
  { id:'ahas_semana',  label:'Momentos aha da semana', prompt:'Quais foram os momentos de maior compreensão esta semana?', placeholder:'Ex: quando percebi a analogia entre tensão e pressão de água...' },
];
const DAYS = ['seg','ter','qua','qui','sex'];

let appData = {};
let currentView = 'diario';
let activeDay = 'seg';
let activeQ = 0;
let activeSQ = 0;
let monthNoteDirty = false;

// ── helpers ──
function getWeekKey(d = new Date()) {
  const x = new Date(d); x.setHours(0,0,0,0);
  x.setDate(x.getDate() - x.getDay() + 1);
  return x.toISOString().split('T')[0];
}
function getMonthKey(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtWeek(k) {
  const s = new Date(k), e = new Date(k);
  e.setDate(e.getDate()+6);
  const o = {day:'numeric',month:'short'};
  return `${s.toLocaleDateString('pt-PT',o)} – ${e.toLocaleDateString('pt-PT',o)}`;
}
function fmtMonth(k) {
  const [y,m] = k.split('-');
  return new Date(y,m-1,1).toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
}
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
function saveDataStore() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

const weekKey = getWeekKey();
const monthKey = getMonthKey();

function getWeekData() { return appData[weekKey] || {}; }
function getDayData(day) { return getWeekData().days?.[day] || {}; }
function getSynthData() { return getWeekData().synth || {}; }
function getDisciplines() { return getWeekData().disciplines || []; }

function getDailyScore(dd) {
  if (!dd) return 0;
  return Math.round(DAILY_Q.filter(q=>(dd[q.id]||'').trim().length>5).length / DAILY_Q.length * 100);
}
function getWeeklyScore(sd) {
  if (!sd) return 0;
  return Math.round(WEEKLY_Q.filter(q=>(sd[q.id]||'').trim().length>10).length / WEEKLY_Q.length * 100);
}

function getTodayKey() {
  return ['dom','seg','ter','qua','qui','sex','sab'][new Date().getDay()];
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  appData = loadData();
  const today = getTodayKey();
  activeDay = (today==='dom'||today==='sab') ? 'seg' : today;
  renderAll();
}

function renderAll() {
  renderWeekLabels();
  renderDayButtons();
  renderQNavDiario();
  renderQCardDiario();
  renderDiscTags();
  renderQNavSintese();
  renderSQCard();
  renderDaysRegistered();
  renderSynthProgress();
  renderHistorico();
  renderMensal();
  updateAIBlocks();
}

// ── week labels ──
function renderWeekLabels() {
  document.getElementById('week-label-diario').textContent = fmtWeek(weekKey);
  document.getElementById('week-label-sintese').textContent = fmtWeek(weekKey);
}

// ── discipline tags ──
function renderDiscTags() {
  const disc = getDisciplines();
  const wrap = document.getElementById('disc-tags');
  wrap.innerHTML = '';
  DISCIPLINES.forEach(d => {
    const el = document.createElement('span');
    el.className = 'disc-tag' + (disc.includes(d) ? ' active' : '');
    el.textContent = d;
    el.onclick = () => toggleDisc(d);
    wrap.appendChild(el);
  });
}

function toggleDisc(d) {
  if (!appData[weekKey]) appData[weekKey] = {};
  let disc = appData[weekKey].disciplines || [];
  disc = disc.includes(d) ? disc.filter(x=>x!==d) : [...disc, d];
  appData[weekKey].disciplines = disc;
  markUnsaved();
  renderDiscTags();
}

// ── day buttons ──
function renderDayButtons() {
  const wrap = document.getElementById('day-btns');
  wrap.innerHTML = '';
  DAYS.forEach(d => {
    const sc = getDailyScore(getDayData(d));
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (activeDay===d ? ' active' : '');
    btn.innerHTML = `<span class="day-name">${d}</span>${sc>0?`<span class="day-pct" style="color:${sc===100?'var(--green)':'var(--amber)'}">${sc}%</span>`:''}`;
    btn.onclick = () => { activeDay=d; activeQ=0; renderDayButtons(); renderQNavDiario(); renderQCardDiario(); };
    wrap.appendChild(btn);
  });
}

// ── Q nav diário ──
function renderQNavDiario() {
  const dd = getDayData(activeDay);
  const wrap = document.getElementById('q-nav-diario');
  wrap.innerHTML = '';
  DAILY_Q.forEach((q,i) => {
    const filled = (dd[q.id]||'').trim().length>5;
    const btn = document.createElement('button');
    btn.className = 'q-nav-btn' + (activeQ===i?' active':'') + (filled?' filled':'');
    btn.innerHTML = `<span class="q-num">${filled?'✓':'0'+(i+1)}</span><span class="q-label">${q.label}</span>`;
    btn.onclick = () => { activeQ=i; renderQNavDiario(); renderQCardDiario(); };
    wrap.appendChild(btn);
  });
}

// ── Q card diário ──
function renderQCardDiario() {
  const q = DAILY_Q[activeQ];
  const dd = getDayData(activeDay);
  document.getElementById('q-counter').textContent = `${activeDay.toUpperCase()} · ${String(activeQ+1).padStart(2,'0')} / ${DAILY_Q.length}`;
  document.getElementById('q-prompt').textContent = q.prompt;
  const ta = document.getElementById('q-textarea');
  ta.value = dd[q.id] || '';
  ta.placeholder = q.placeholder;
  document.getElementById('q-prev').disabled = activeQ===0;
  document.getElementById('q-next').disabled = activeQ===DAILY_Q.length-1;
  // fade
  const main = document.getElementById('diario-main');
  main.classList.remove('fade');
  void main.offsetWidth;
  main.classList.add('fade');
}

function onDayInput(val) {
  const q = DAILY_Q[activeQ];
  if (!appData[weekKey]) appData[weekKey] = {};
  if (!appData[weekKey].days) appData[weekKey].days = {};
  if (!appData[weekKey].days[activeDay]) appData[weekKey].days[activeDay] = {};
  appData[weekKey].days[activeDay][q.id] = val;
  markUnsaved();
  renderQNavDiario();
  renderDayButtons();
}

function prevQ() { if(activeQ>0){activeQ--;renderQNavDiario();renderQCardDiario();} }
function nextQ() { if(activeQ<DAILY_Q.length-1){activeQ++;renderQNavDiario();renderQCardDiario();} }

// ── Synth Q nav ──
function renderQNavSintese() {
  const sd = getSynthData();
  const wrap = document.getElementById('q-nav-sintese');
  wrap.innerHTML = '';
  WEEKLY_Q.forEach((q,i) => {
    const filled = (sd[q.id]||'').trim().length>10;
    const btn = document.createElement('button');
    btn.className = 'q-nav-btn' + (activeSQ===i?' active':'') + (filled?' filled':'');
    btn.innerHTML = `<span class="q-num">${filled?'✓':'0'+(i+1)}</span><span class="q-label">${q.label}</span>`;
    btn.onclick = () => { activeSQ=i; renderQNavSintese(); renderSQCard(); };
    wrap.appendChild(btn);
  });
}

function renderSQCard() {
  const q = WEEKLY_Q[activeSQ];
  const sd = getSynthData();
  document.getElementById('sq-counter').textContent = `SÍNTESE · ${String(activeSQ+1).padStart(2,'0')} / ${WEEKLY_Q.length}`;
  document.getElementById('sq-prompt').textContent = q.prompt;
  const ta = document.getElementById('sq-textarea');
  ta.value = sd[q.id] || '';
  ta.placeholder = q.placeholder;
  document.getElementById('sq-prev').disabled = activeSQ===0;
  document.getElementById('sq-next').disabled = activeSQ===WEEKLY_Q.length-1;
  const main = document.getElementById('sintese-main');
  main.classList.remove('fade'); void main.offsetWidth; main.classList.add('fade');
}

function onSynthInput(val) {
  const q = WEEKLY_Q[activeSQ];
  if (!appData[weekKey]) appData[weekKey]={};
  if (!appData[weekKey].synth) appData[weekKey].synth={};
  appData[weekKey].synth[q.id] = val;
  markUnsaved();
  renderQNavSintese();
  renderSynthProgress();
  updateAIBlocks();
}

function prevSQ() { if(activeSQ>0){activeSQ--;renderQNavSintese();renderSQCard();} }
function nextSQ() { if(activeSQ<WEEKLY_Q.length-1){activeSQ++;renderQNavSintese();renderSQCard();} }

function renderSynthProgress() {
  const sc = getWeeklyScore(getSynthData());
  document.getElementById('synth-pct').textContent = sc + '%';
  document.getElementById('synth-bar').style.width = sc + '%';
}

function renderDaysRegistered() {
  const wrap = document.getElementById('days-registered-list');
  wrap.innerHTML = '';
  DAYS.forEach(d => {
    const sc = getDailyScore(getDayData(d));
    const row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `<span class="day-name">${d}</span><span class="day-sc" style="color:${sc===100?'var(--green)':sc>0?'var(--amber)':'#1e1e1e'}">${sc>0?sc+'%':'—'}</span>`;
    wrap.appendChild(row);
  });
}

function updateAIBlocks() {
  const sc = getWeeklyScore(getSynthData());
  document.getElementById('ai-semana-block').style.display = sc>=50 ? 'block' : 'none';
  const allW = Object.keys(appData).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)&&k.slice(0,7)===monthKey);
  document.getElementById('ai-mes-block').style.display = allW.length>=2 ? 'block' : 'none';
}

// ── HISTÓRICO ──
function renderHistorico() {
  const allWeeks = Object.keys(appData).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort((a,b)=>b.localeCompare(a));
  const wrap = document.getElementById('historico-list');
  wrap.innerHTML = '';
  if (!allWeeks.length) { wrap.innerHTML='<p class="empty">Sem entradas ainda.</p>'; return; }
  allWeeks.forEach(w => {
    const wd = appData[w] || {};
    const sd = getWeeklyScore(wd.synth);
    const isNow = w===weekKey;
    const diasOk = DAYS.filter(d=>getDailyScore(wd.days?.[d])>0);
    const card = document.createElement('div');
    card.className = 'hist-card' + (isNow?' current':'');

    const sdColor = sd>=80?'var(--green)':sd>=40?'var(--gold)':'#4a3020';
    let inner = `<div class="hist-header">
      <div>
        <div class="hist-week">${isNow?'ATUAL — ':''}${fmtWeek(w)}</div>
        ${wd.disciplines?.length?`<div class="hist-discs">${wd.disciplines.join(' · ')}</div>`:''}
      </div>
      <div>
        <div class="hist-score-lbl">SÍNTESE</div>
        <div class="hist-score" style="color:${sdColor}">${sd}%</div>
      </div>
    </div>
    <div class="day-pills">
      ${DAYS.map(d=>`<div class="day-pill ${diasOk.includes(d)?'ok':'empty'}">${d}</div>`).join('')}
    </div>`;

    if (wd.synth) {
      ['ahas_semana','habilidade','revisao'].forEach(qid => {
        const val = wd.synth[qid];
        const q = WEEKLY_Q.find(q=>q.id===qid);
        if (val && val.trim().length>=5) {
          inner += `<div class="hist-entry-label">${q?.label}</div><div class="hist-entry-val">${val}</div>`;
        }
      });
    }
    card.innerHTML = inner;
    wrap.appendChild(card);
  });
}

// ── MENSAL ──
function renderMensal() {
  document.getElementById('month-title').textContent = fmtMonth(monthKey);
  const allW = Object.keys(appData).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)&&k.slice(0,7)===monthKey).sort();
  document.getElementById('month-count').textContent = `${allW.length} semana${allW.length!==1?'s':''}`;

  const pat = document.getElementById('month-pattern');
  if (!allW.length) { pat.innerHTML='<p style="color:#2a2018;font-size:0.8rem;">Sem semanas registadas este mês.</p>'; }
  else {
    pat.innerHTML = allW.map(w => {
      const wd = appData[w]||{};
      const diasOk = DAYS.filter(d=>getDailyScore(wd.days?.[d])>0).length;
      const sd = getWeeklyScore(wd.synth);
      const aha = wd.synth?.ahas_semana;
      const dColor = diasOk>=4?'var(--green)':diasOk>=2?'var(--gold)':'#5a3020';
      const sColor = sd>=80?'var(--green)':sd>=40?'var(--gold)':'#5a3020';
      return `<div class="month-week-row">
        <div class="month-week-meta">
          <span class="month-week-name">${fmtWeek(w)}</span>
          <div class="month-week-stats">
            <span class="month-stat" style="color:${dColor}">${diasOk}/5 dias</span>
            <span class="month-stat" style="color:${sColor}">síntese ${sd}%</span>
          </div>
        </div>
        ${aha?`<div class="month-aha">💡 ${aha}</div>`:''}
      </div>`;
    }).join('');
  }

  const note = (appData.months||{})[monthKey]?.note || '';
  document.getElementById('month-note-ta').value = note;
}

function saveMonthNote() {
  const note = document.getElementById('month-note-ta').value;
  if (!appData.months) appData.months={};
  appData.months[monthKey] = { note, savedAt: new Date().toISOString() };
  saveDataStore();
  const btn = document.getElementById('month-note-btn');
  btn.textContent='✓ Guardado'; btn.classList.add('saved');
  monthNoteDirty=false;
  setTimeout(()=>{btn.textContent='Guardar nota';btn.classList.remove('saved');},2000);
}

// ── SAVE ──
function markUnsaved() {
  ['diario','sintese'].forEach(v=>{
    const btn=document.getElementById(`save-btn-${v}`);
    if(btn){btn.textContent='Guardar';btn.classList.remove('saved');}
  });
}

function handleSave() {
  saveDataStore();
  ['diario','sintese'].forEach(v=>{
    const btn=document.getElementById(`save-btn-${v}`);
    if(btn){btn.textContent='✓ Guardado';btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='Guardar';btn.classList.remove('saved');},2000);
    }
  });
  renderHistorico();
  renderMensal();
  updateAIBlocks();
}

// ── VIEW SWITCH ──
function setView(v) {
  currentView=v;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${v}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>{
    if(t.getAttribute('onclick')===`setView('${v}')`) t.classList.add('active');
  });
  // reset AI state
  ['diario','semana','mes'].forEach(m=>{
    const r=document.getElementById(`ai-resp-${m}`); if(r){r.classList.remove('visible');}
    const b=document.getElementById(`ai-btn-${m}`); if(b&&b.textContent!=='Pedir reflexão'&&b.textContent!=='Pedir análise'&&b.textContent!=='Pedir análise mensal'){
      b.textContent = m==='diario'?'Pedir reflexão':m==='semana'?'Pedir análise':'Pedir análise mensal';
    }
  });
  if (v==='sintese') { renderDaysRegistered(); renderSynthProgress(); }
  if (v==='historico') renderHistorico();
  if (v==='mensal') renderMensal();
}

// ══════════════════════════════════════════
// AI
// ══════════════════════════════════════════
const AI_SYSTEM = {
  dia: `És um parceiro socrático para LP, 17 anos, estudante de informática em Luanda. Analisa a entrada do dia. Sê específico: (1) aponta o que foi sólido, (2) faz UMA pergunta socrática sobre a dúvida que ficou, (3) sugere como abordar amanhã. Máximo 120 palavras. Sem elogios genéricos.`,
  semana: `És um parceiro socrático para LP, 17 anos, estudante de informática em Luanda. Analisa a semana completa. Identifica: (1) o padrão mais claro de aprendizagem, (2) onde a IA substituiu vs onde ajudou o pensamento, (3) UMA pergunta sobre o conceito mais confuso, (4) foco concreto para a próxima semana. Máximo 150 palavras.`,
  mes: `És um parceiro socrático para LP, 17 anos, estudante de informática em Luanda. Síntese mensal: (1) que conceitos consolidou de facto, (2) que padrão de uso da IA se revelou, (3) qual é a maior lacuna ainda por resolver, (4) uma recomendação estratégica para o próximo mês. Máximo 180 palavras.`
};

async function handleAI(mode) {
  const btnId = mode==='dia'?'ai-btn-diario':mode==='semana'?'ai-btn-semana':'ai-btn-mes';
  const respId = mode==='dia'?'ai-resp-diario':mode==='semana'?'ai-resp-semana':'ai-resp-mes';
  const textId = mode==='dia'?'ai-text-diario':mode==='semana'?'ai-text-semana':'ai-text-mes';
  const btn = document.getElementById(btnId);
  const resp = document.getElementById(respId);
  const textEl = document.getElementById(textId);

  btn.disabled=true; btn.textContent='...';
  resp.classList.add('visible');
  textEl.textContent='A pensar...'; textEl.style.color='var(--dim)'; textEl.style.fontFamily='var(--mono)'; textEl.style.fontSize='0.7rem';

  let content = '';
  if (mode==='dia') {
    const dd = getDayData(activeDay);
    content = `Dia: ${activeDay}\nDisciplinas: ${getDisciplines().join(', ')||'n/a'}\n\n` +
      DAILY_Q.map(q=>`${q.label}:\n${dd[q.id]||'(em branco)'}`).join('\n\n');
  } else if (mode==='semana') {
    const diasT = DAYS.map(d=>{
      const dd=getDayData(d); if(!Object.keys(dd).length) return null;
      return `${d.toUpperCase()}:\n`+DAILY_Q.map(q=>`  ${q.label}: ${dd[q.id]||'-'}`).join('\n');
    }).filter(Boolean).join('\n\n');
    const sd=getSynthData();
    const sint=WEEKLY_Q.map(q=>`${q.label}:\n${sd[q.id]||'(em branco)'}`).join('\n\n');
    content=`ENTRADAS DIÁRIAS:\n${diasT}\n\nSÍNTESE SEMANAL:\n${sint}`;
  } else {
    const weeks=Object.keys(appData).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)&&k.slice(0,7)===monthKey).sort();
    content=`Mês: ${fmtMonth(monthKey)}\n\n`+weeks.map(w=>{
      const wd=appData[w];
      return `Semana ${fmtWeek(w)}:\n`+WEEKLY_Q.map(q=>`  ${q.label}: ${wd?.synth?.[q.id]||'-'}`).join('\n');
    }).join('\n\n');
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:AI_SYSTEM[mode],
        messages:[{role:'user',content}]
      })
    });
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'Sem resposta.';
    textEl.textContent=text;
    textEl.style.color='var(--subtext)'; textEl.style.fontFamily='Georgia,serif'; textEl.style.fontSize='0.85rem';
  } catch {
    textEl.textContent='Erro ao contactar a IA. Verifica a ligação.';
    textEl.style.color='var(--dim)';
  }

  btn.disabled=false;
  btn.textContent=mode==='dia'?'Regenerar':mode==='semana'?'Regenerar':'Regenerar';
}

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
init();

      .then(reg => console.log('[SW] Registado:', reg.scope))
      .catch(err => console.warn('[SW] Falhou:', err));
  });
}
